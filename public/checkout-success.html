<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Success | AutoParts Pro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .success-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }

        .success-content {
            background: var(--bg-elevated);
            padding: 4rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .success-icon {
            font-size: 4rem;
            color: #10b981;
            /* Success green */
            margin-bottom: 1.5rem;
            display: inline-block;
            background: rgba(16, 185, 129, 0.1);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            line-height: 100px;
        }

        .success-content h1 {
            margin-bottom: 1rem;
            font-size: 2.5rem;
            font-family: var(--font-heading);
            color: var(--text-primary);
        }

        .success-content p {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="success-page">
        <div class="success-content">
            <div class="success-icon">✓</div>
            <h1>Order Confirmed!</h1>
            <p>Thank you for shopping at AutoParts Pro. Your order has been placed successfully in our demo environment.
                A confirmation email would normally be sent shortly.</p>
            <a href="/" class="cta-primary">Continue Shopping</a>
        </div>
    </div>
</body>

</html>
